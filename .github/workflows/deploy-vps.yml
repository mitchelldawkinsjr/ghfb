name: Deploy to mitch-cloud

on:
  push:
    branches: [main, master]
    paths:
      - "*.html"
      - "js/**"
      - "shared/**"
      - "check-in-config.js"
      - "manifest.webmanifest"
      - "sw.js"
      - "icons/**"
      - "images/**"
      - "data/**"
      - "files/**"
      - "deploy/**"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ghfb to mitch-cloud
    runs-on: [self-hosted, Linux, mitch-cloud, ghfb]
    if: >-
      github.event_name != 'pull_request' &&
      github.event_name != 'pull_request_target' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        )
      ) &&
      github.event.repository.fork == false &&
      github.repository == 'mitchelldawkinsjr/ghfb'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to mitch-cloud
        run: |
          set -euo pipefail
          deploy_dir=/opt/360ws/clients/docker-app/ghfb

          mkdir -p "$deploy_dir"
          docker network ls --format '{{.Name}}' | grep -q '^360ws-network$' || docker network create 360ws-network

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.env' \
            ./ "$deploy_dir/"

          cd "$deploy_dir"
          docker compose -f docker-compose.prod.yml build --no-cache
          docker compose -f docker-compose.prod.yml down || true
          docker compose -f docker-compose.prod.yml up -d

          echo "Waiting for ghfb-app to be ready..."
          sleep 5

          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -fsS http://localhost:8020/ -o /dev/null; then
              echo "Health check passed!"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Health check attempt $attempt/$max_attempts failed, retrying..."
            sleep 2
          done

          echo "Health check failed after $max_attempts attempts."
          docker compose -f docker-compose.prod.yml logs app
          exit 1
