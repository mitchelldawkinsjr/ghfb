name: Deploy to mitch-cloud

on:
  push:
    branches: [main, master]
    paths:
      - "*.html"
      - "check-in-config.js"
      - "manifest.webmanifest"
      - "sw.js"
      - "icons/**"
      - "images/**"
      - "data/**"
      - "files/**"
      - "deploy/**"
      - "check-in-config.js"
      - "Dockerfile"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-vps.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy ghfb to mitch-cloud
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::VPS_SSH_KEY is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "::error::VPS_HOST and VPS_USER must be set in repository secrets."
            exit 1
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          host="${VPS_HOST//[[:space:]]/}"
          if [ -z "$host" ]; then
            echo "::error::VPS_HOST is empty (check repository secret for stray spaces/newlines)."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          if [ -n "$VPS_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
            echo "Using VPS_SSH_KNOWN_HOSTS secret (skipping ssh-keyscan)."
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            echo "ssh-keyscan attempt ${attempt}/5 for ${host}..."
            for scan_flags in "-4 -t ed25519,rsa,ecdsa" "-t ed25519,rsa,ecdsa"; do
              if ssh-keyscan -T 15 -p 22 ${scan_flags} -H "${host}" >> ~/.ssh/known_hosts 2>keyscan.err && [ -s ~/.ssh/known_hosts ]; then
                echo "ssh-keyscan succeeded (${scan_flags})."
                exit 0
              fi
            done
            cat keyscan.err 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::warning::ssh-keyscan could not populate known_hosts; deploy will use StrictHostKeyChecking=accept-new."

      - name: Deploy to mitch-cloud
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          host="${VPS_HOST//[[:space:]]/}"
          user="${VPS_USER//[[:space:]]/}"
          ssh_opts="-o ConnectTimeout=20 -o ServerAliveInterval=30 -o StrictHostKeyChecking=accept-new -o HostKeyAlgorithms=ssh-ed25519,ecdsa-sha2-nistp256,rsa-sha2-512,rsa-sha2-256"

          ssh ${ssh_opts} "${user}@${host}" << 'EOF'
            set -e
            mkdir -p /opt/360ws/clients/docker-app/ghfb
            docker network ls --format '{{.Name}}' | grep -q '^360ws-network$' || docker network create 360ws-network
          EOF

          rsync -avz --delete -e "ssh ${ssh_opts}" \
            --exclude '.git' \
            --exclude '.env' \
            ./ "${user}@${host}:/opt/360ws/clients/docker-app/ghfb/"

          ssh ${ssh_opts} "${user}@${host}" << 'EOF'
            set -e
            cd /opt/360ws/clients/docker-app/ghfb

            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for ghfb-app to be ready..."
            sleep 5

            echo "Performing health check..."
            max_attempts=30
            attempt=0
            while [ $attempt -lt $max_attempts ]; do
              if curl -fsS http://localhost:8020/ -o /dev/null; then
                echo "Health check passed!"
                break
              fi
              attempt=$((attempt + 1))
              echo "Health check attempt $attempt/$max_attempts failed, retrying..."
              sleep 2
            done

            if [ $attempt -eq $max_attempts ]; then
              echo "Health check failed after $max_attempts attempts."
              docker compose -f docker-compose.prod.yml logs app
              exit 1
            fi

            echo "Deployment successful!"
          EOF
