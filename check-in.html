<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Check-in — Godwin Heights Football</title>
  <meta name="description" content="Coach tap-list attendance check-in for summer weightroom and conditioning." />
  <meta name="theme-color" content="#0a0c10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0a0c10;
      --bg1: #12161e;
      --card: #181e2a;
      --border: rgba(212, 175, 55, 0.25);
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #e5a32a;
      --good: #5dd39e;
      --wr: #ffe599;
      --cond: #9fc5e8;
      --danger: #f4a4a4;
      --font: "Instrument Sans", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 55%, #0f1520 100%);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }
    .shell { max-width: 900px; margin: 0 auto; }
    .back-link {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 0.9375rem;
    }
    .back-link:hover { text-decoration: underline; }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      color: var(--accent);
    }
    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.9375rem;
    }
    .banner {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.875rem;
      line-height: 1.45;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .banner.warn {
      border-color: rgba(229, 163, 42, 0.5);
      color: var(--accent);
    }
    .banner.error {
      border-color: rgba(244, 164, 164, 0.5);
      color: var(--danger);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .seg {
      display: flex;
      gap: 8px;
    }
    .seg button {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
      font-family: inherit;
    }
    .seg button.active[data-type="weightroom"] {
      background: rgba(255, 229, 153, 0.18);
      border-color: var(--wr);
    }
    .seg button.active[data-type="conditioning"] {
      background: rgba(159, 197, 232, 0.18);
      border-color: var(--cond);
    }
    #search {
      flex: 1;
      min-width: 160px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    .pin-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .pin-row input {
      width: 100px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
    }
    .status {
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      font-size: 0.9375rem;
    }
    .status.error { border-color: rgba(244, 164, 164, 0.45); color: var(--danger); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
    }
    .player {
      padding: 14px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      text-align: left;
      cursor: pointer;
      font-size: 0.875rem;
      line-height: 1.35;
      font-family: inherit;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      min-height: 52px;
    }
    .player:hover:not(:disabled) {
      border-color: rgba(229, 163, 42, 0.45);
    }
    .player.checked {
      border-color: var(--good);
      background: rgba(93, 211, 158, 0.14);
      font-weight: 600;
    }
    .player.is-queued {
      border-color: rgba(229, 163, 42, 0.5);
    }
    .player.is-saving {
      border-color: rgba(159, 197, 232, 0.55);
    }
    .player .mark {
      display: block;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--good);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="shell">
    <a class="back-link" href="/">← Back to Team Tools</a>
    <h1>Coach check-in</h1>
    <p class="subtitle">Tap a name to mark <strong>X</strong> for today’s session. Changes save to the attendance sheet.</p>

    <div id="setupBanner" class="banner warn" hidden>
      Saving is not connected. Redeploy ghfb and ensure Apps Script has your
      <code>SHEET_ID</code> set, then <strong>Deploy → New version</strong> on the web app.
    </div>

    <div class="toolbar">
      <div class="seg" role="group" aria-label="Session type">
        <button type="button" data-type="weightroom" class="active">Weightroom</button>
        <button type="button" data-type="conditioning">Conditioning</button>
      </div>
      <input type="search" id="search" placeholder="Search names…" autocomplete="off" />
      <div class="pin-row" id="pinRow">
        <label for="pin">PIN</label>
        <input type="password" id="pin" inputmode="numeric" autocomplete="current-password" />
      </div>
    </div>

    <div id="status" class="status">Loading roster…</div>
    <div id="grid" class="grid" aria-live="polite"></div>
  </div>

  <script src="/check-in-config.js"></script>
  <script>
    const CSV_URL = "/api/attendance.csv";
    const CHECKIN_API = window.GHFB_CHECKIN_API || "/api/checkin";
    const PIN_STORAGE_KEY = "ghfb-coach-pin";
    const CSV_CACHE_KEY = "ghfb-attendance-csv";
    const CSV_CACHE_TTL_MS = 3 * 60 * 1000;
    const CHECKIN_STATE_TTL_MS = 45 * 1000;
    const saveQueue = [];
    let saveQueueRunning = false;
    let syncing = false;
    let viewOnly = false;
    const buttonByRow = new Map();
    const rowUiState = new Map();
    const SUMMARY_HEADERS = new Set([
      "Current Total",
      "Ironman %",
      "# of sessions this summer",
      "% required for ironman",
    ]);

    let sessionType = "weightroom";
    let players = [];
    let todayLabel = "";

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");
    const searchEl = document.getElementById("search");
    const pinEl = document.getElementById("pin");
    const setupBanner = document.getElementById("setupBanner");

    const savedPin = sessionStorage.getItem(PIN_STORAGE_KEY);
    if (savedPin) pinEl.value = savedPin;
    pinEl.addEventListener("change", () => {
      sessionStorage.setItem(PIN_STORAGE_KEY, pinEl.value.trim());
    });

    document.querySelectorAll(".seg button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".seg button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        sessionType = btn.dataset.type;
        load();
      });
    });
    searchEl.addEventListener("input", render);

    function getPin() {
      return pinEl.value.trim();
    }

    function setStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.classList.toggle("error", !!isError);
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i++;
          } else inQuotes = !inQuotes;
          continue;
        }
        if (!inQuotes && ch === ",") {
          row.push(value);
          value = "";
          continue;
        }
        if (!inQuotes && (ch === "\n" || ch === "\r")) {
          if (ch === "\r" && next === "\n") i++;
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
          continue;
        }
        value += ch;
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      return rows;
    }

    function getPlayerDisplayName(row) {
      const first = String(row[0] ?? "").trim();
      const last = String(row[1] ?? "").trim();
      return `${first} ${last}`.trim();
    }

    function getDataRows(rows) {
      const body = rows.slice(1);
      let end = body.length;
      while (end > 0) {
        const row = body[end - 1];
        const name = getPlayerDisplayName(row);
        const firstCol = String(row[0] ?? "").trim();
        if (name || firstCol) break;
        end -= 1;
      }
      return body.slice(0, end).filter((row) => {
        const name = getPlayerDisplayName(row);
        if (!name) return false;
        if (/^first\s*name$/i.test(String(row[0] ?? "").trim())) return false;
        return true;
      });
    }

    function parseHeaderDate(value) {
      const text = String(value ?? "").trim();
      let match = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if (match) {
        let year = Number(match[3]);
        if (year < 100) year += 2000;
        const date = new Date(year, Number(match[1]) - 1, Number(match[2]));
        date.setHours(0, 0, 0, 0);
        return Number.isNaN(date.getTime()) ? null : date;
      }
      match = text.match(/^(\d{1,2})\/(\d{1,2})$/);
      if (match) {
        const year = new Date().getFullYear();
        const date = new Date(year, Number(match[1]) - 1, Number(match[2]));
        date.setHours(0, 0, 0, 0);
        return Number.isNaN(date.getTime()) ? null : date;
      }
      return null;
    }

    function getTodayLabel() {
      const d = new Date();
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function findSessionColumnIndex(headerRow, sessionType) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const type = String(sessionType).toLowerCase();

      for (let col = 2; col < headerRow.length; col++) {
        const header = String(headerRow[col] ?? "").trim();
        if (!header || SUMMARY_HEADERS.has(header)) break;

        const dateVal = parseHeaderDate(header);
        if (!dateVal || dateVal > today) continue;
        if (dateVal.getTime() !== today.getTime()) continue;

        if (type === "weightroom") return col;
        if (type === "conditioning") {
          const next = String(headerRow[col + 1] ?? "").trim().toUpperCase();
          if (next === "C") return col + 1;
          return null;
        }
      }
      return null;
    }

    function buildFromCsv(rows, sessionType) {
      const headerRow = rows[0] || [];
      const dataRows = getDataRows(rows);
      todayLabel = getTodayLabel();
      const colIdx = findSessionColumnIndex(headerRow, sessionType);

      if (colIdx == null) {
        return {
          ok: false,
          error: `No column found for today (${todayLabel}). Add a "${todayLabel}" header in the sheet first.`,
          todayLabel,
        };
      }

      const players = dataRows.map((row, i) => {
        const sheetRow = i + 2;
        const checked = String(row[colIdx] ?? "").trim().toUpperCase() === "X";
        const checked = String(row[colIdx] ?? "").trim().toUpperCase() === "X";
        return {
          sheetRow,
          name: getPlayerDisplayName(row),
          checked,
          serverChecked: checked,
        };
      });

      return {
        ok: true,
        todayLabel,
        players,
        checkedCount: players.filter((p) => p.checked).length,
        total: players.length,
        syncing: true,
        viewOnly: false,
      };
    }

    function normalizePlayers(list) {
      return (list || []).map((p) => ({
        sheetRow: p.sheetRow,
        name: p.name,
        checked: !!p.checked,
        serverChecked: p.serverChecked != null ? !!p.serverChecked : !!p.checked,
      }));
    }

    function mergeLiveMarks(apiData) {
      if (!apiData?.ok) return;
      const byRow = new Map(apiData.players.map((p) => [p.sheetRow, !!p.checked]));
      for (const pl of players) {
        if (byRow.has(pl.sheetRow)) {
          const checked = byRow.get(pl.sheetRow);
          pl.checked = checked;
          pl.serverChecked = checked;
        }
      }
      syncing = false;
      refreshAllButtons();
      setStatus(statusLine(queueSuffix()), false);
      persistCheckInCache();
    }

    function checkInStateCacheKey(type) {
      return `ghfb-checkin-${type}-${getTodayLabel()}`;
    }

    function readCsvCache() {
      try {
        const raw = sessionStorage.getItem(CSV_CACHE_KEY);
        if (!raw) return null;
        const { savedAt, csv } = JSON.parse(raw);
        if (!csv || Date.now() - savedAt >= CSV_CACHE_TTL_MS) return null;
        return csv;
      } catch {
        return null;
      }
    }

    function writeCsvCache(csv) {
      try {
        sessionStorage.setItem(
          CSV_CACHE_KEY,
          JSON.stringify({ savedAt: Date.now(), csv })
        );
      } catch {
        /* ignore */
      }
    }

    function readCheckInCache(type) {
      try {
        const raw = sessionStorage.getItem(checkInStateCacheKey(type));
        if (!raw) return null;
        const { savedAt, data } = JSON.parse(raw);
        if (!data || Date.now() - savedAt >= CHECKIN_STATE_TTL_MS) return null;
        return data;
      } catch {
        return null;
      }
    }

    function writeCheckInCache(type, data) {
      if (!data?.ok) return;
      try {
        sessionStorage.setItem(
          checkInStateCacheKey(type),
          JSON.stringify({ savedAt: Date.now(), data })
        );
      } catch {
        /* ignore */
      }
    }

    async function fetchCsvRows() {
      const cached = readCsvCache();
      if (cached) return parseCSV(cached);
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error("Could not load attendance CSV");
      const text = await res.text();
      writeCsvCache(text);
      return parseCSV(text);
    }

    async function apiGet(action, params) {
      const qs = new URLSearchParams({ action, ...params });
      const res = await fetch(`${CHECKIN_API}?${qs}`, { cache: "no-store" });
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(res.ok ? "Invalid API response" : `Check-in API error (${res.status})`);
      }
      if (!res.ok && data?.error) throw new Error(data.error);
      return data;
    }

    async function apiToggle(sheetRow) {
      const data = await apiGet("toggleCheckIn", {
        sheetRow: String(sheetRow),
        sessionType,
        pin: getPin(),
      });
      if (data.ok === false) throw new Error(data.error || "Save failed");
      return data;
    }

    function queueSuffix() {
      const q = saveQueue.length;
      const parts = [];
      if (syncing) parts.push("syncing marks…");
      if (q > 0) parts.push(`${q} save${q === 1 ? "" : "s"} queued`);
      if (viewOnly) parts.push("view only");
      return parts.length ? ` · ${parts.join(" · ")}` : "";
    }

    function statusLine() {
      const kind = sessionType === "conditioning" ? "Conditioning" : "Weightroom";
      const n = players.filter((p) => p.checked).length;
      return `${kind} · ${todayLabel} · ${n} / ${players.length} checked in${queueSuffix()}`;
    }

    function markLabel(player, uiState) {
      if (uiState === "saving") return '<span class="mark">Saving…</span>';
      if (uiState === "queued") return '<span class="mark">Queued…</span>';
      if (player.checked) return '<span class="mark">Checked in</span>';
      return "";
    }

    function updatePlayerButton(btn, player, uiState) {
      btn.classList.toggle("checked", player.checked);
      btn.classList.toggle("is-queued", uiState === "queued");
      btn.classList.toggle("is-saving", uiState === "saving");
      btn.innerHTML = player.name + markLabel(player, uiState);
    }

    function refreshRow(sheetRow) {
      const btn = buttonByRow.get(sheetRow);
      const pl = players.find((x) => x.sheetRow === sheetRow);
      if (!btn || !pl) return;
      updatePlayerButton(btn, pl, rowUiState.get(sheetRow) || "idle");
    }

    function refreshAllButtons() {
      for (const pl of players) refreshRow(pl.sheetRow);
    }

    function persistCheckInCache() {
      writeCheckInCache(sessionType, {
        ok: true,
        todayLabel,
        players: players.map((p) => ({
          sheetRow: p.sheetRow,
          name: p.name,
          checked: p.checked,
        })),
        checkedCount: players.filter((p) => p.checked).length,
        total: players.length,
        sessionType,
      });
    }

    function applyData(data) {
      if (!data.ok) {
        setStatus(data.error, true);
        players = [];
        gridEl.innerHTML = "";
        buttonByRow.clear();
        return;
      }
      players = normalizePlayers(data.players);
      todayLabel = data.todayLabel || getTodayLabel();
      if (data.syncing != null) syncing = !!data.syncing;
      if (data.viewOnly != null) viewOnly = !!data.viewOnly;
      setStatus(statusLine(), false);
      setupBanner.hidden = !viewOnly;
      render();
    }

    function render() {
      const q = searchEl.value.trim().toLowerCase();
      gridEl.innerHTML = "";
      buttonByRow.clear();
      players
        .filter((p) => !q || p.name.toLowerCase().includes(q))
        .forEach((p) => {
          const btn = document.createElement("button");
          btn.type = "button";
          const uiState = rowUiState.get(p.sheetRow) || "idle";
          btn.className = "player" + (p.checked ? " checked" : "");
          updatePlayerButton(btn, p, uiState);
          btn.addEventListener("click", () => toggle(p.sheetRow));
          buttonByRow.set(p.sheetRow, btn);
          gridEl.appendChild(btn);
        });
    }

    function enqueueSave(sheetRow) {
      const idx = saveQueue.findIndex((j) => j.sheetRow === sheetRow);
      if (idx >= 0) saveQueue.splice(idx, 1);
      saveQueue.push({ sheetRow });
      rowUiState.set(sheetRow, "queued");
      refreshRow(sheetRow);
      setStatus(statusLine(), false);
      drainSaveQueue();
    }

    async function syncRowToServer(sheetRow) {
      const pl = players.find((x) => x.sheetRow === sheetRow);
      if (!pl) return;

      let guard = 0;
      while (pl.checked !== pl.serverChecked && guard < 4) {
        guard += 1;
        const res = await apiToggle(sheetRow);
        pl.serverChecked = !!res.checked;
        pl.checked = pl.serverChecked;
      }
    }

    async function drainSaveQueue() {
      if (saveQueueRunning) return;
      saveQueueRunning = true;
      try {
        while (saveQueue.length > 0) {
          const job = saveQueue[0];
          const pl = players.find((x) => x.sheetRow === job.sheetRow);
          if (!pl) {
            saveQueue.shift();
            continue;
          }

          const pending = saveQueue.filter((j) => j.sheetRow === job.sheetRow);
          for (const j of pending) {
            const i = saveQueue.indexOf(j);
            if (i >= 0) saveQueue.splice(i, 1);
          }

          if (pl.checked === pl.serverChecked) {
            rowUiState.set(job.sheetRow, "idle");
            refreshRow(job.sheetRow);
            continue;
          }

          rowUiState.set(job.sheetRow, "saving");
          refreshRow(job.sheetRow);
          setStatus(statusLine(), false);

          try {
            await syncRowToServer(job.sheetRow);
            rowUiState.set(job.sheetRow, "idle");
            refreshRow(job.sheetRow);
            persistCheckInCache();
          } catch (err) {
            pl.checked = pl.serverChecked;
            rowUiState.set(job.sheetRow, "idle");
            refreshRow(job.sheetRow);
            setStatus(err.message || String(err), true);
            if (/pin/i.test(String(err.message))) pinEl.focus();
          }
        }
      } finally {
        saveQueueRunning = false;
        setStatus(statusLine(), false);
        if (saveQueue.length > 0) drainSaveQueue();
      }
    }

    function toggle(sheetRow) {
      if (viewOnly) return;
      const pl = players.find((x) => x.sheetRow === sheetRow);
      if (!pl) return;

      pl.checked = !pl.checked;
      refreshRow(sheetRow);
      setStatus(statusLine(), false);
      enqueueSave(sheetRow);
    }

    async function load() {
      setStatus("Loading roster…");
      gridEl.innerHTML = "";

      const cachedApi = readCheckInCache(sessionType);
      if (cachedApi?.ok) {
        applyData({ ...cachedApi, syncing: false, viewOnly: false });
      }

      const cachedCsvText = readCsvCache();
      if (cachedCsvText && !cachedApi?.ok) {
        const shell = buildFromCsv(parseCSV(cachedCsvText), sessionType);
        if (shell.ok) applyData(shell);
      }

      syncing = true;
      try {
        const [rows, apiData] = await Promise.all([
          fetchCsvRows(),
          apiGet("getCheckInData", { sessionType, pin: getPin() }),
        ]);

        if (!players.length && rows) {
          const shell = buildFromCsv(rows, sessionType);
          if (shell.ok) applyData(shell);
        }

        if (apiData.ok) {
          if (players.length) {
            mergeLiveMarks(apiData);
            writeCheckInCache(sessionType, {
              ok: true,
              todayLabel,
              players: players.map((p) => ({
                sheetRow: p.sheetRow,
                name: p.name,
                checked: p.checked,
              })),
              checkedCount: players.filter((p) => p.checked).length,
              total: players.length,
              sessionType,
            });
          } else {
            writeCheckInCache(sessionType, apiData);
            applyData({ ...apiData, syncing: false, viewOnly: false });
          }
          return;
        }

        syncing = false;
        setStatus(apiData.error, true);
        if (!players.length && rows) {
          const shell = buildFromCsv(rows, sessionType);
          if (shell.ok) applyData({ ...shell, viewOnly: true });
        }
      } catch (err) {
        const msg = err.message || String(err);
        if (/pin/i.test(msg)) {
          setStatus(msg, true);
          pinEl.focus();
          return;
        }

        syncing = false;
        if (!players.length) {
          try {
            const rows = await fetchCsvRows();
            const shell = buildFromCsv(rows, sessionType);
            if (shell.ok) {
              applyData({ ...shell, viewOnly: true });
              return;
            }
            setStatus(shell.error || msg, true);
          } catch {
            setStatus(msg, true);
          }
        } else {
          setStatus(`${msg} · showing cached roster`, true);
        }
      }
    }

    load();
  </script>
</body>
</html>
