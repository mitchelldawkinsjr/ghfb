<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Check-in — Godwin Heights Football</title>
  <meta name="description" content="Coach tap-list attendance check-in for summer weightroom and conditioning." />
  <meta name="theme-color" content="#0a0c10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 55%, #0f1520 100%);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }
    .shell { max-width: 900px; margin: 0 auto; }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      color: var(--accent);
    }
    .subtitle {
      margin: 0 0 20px;
      font-size: 0.9375rem;
    }
    .banner {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.875rem;
      line-height: 1.45;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .banner.warn {
      border-color: rgba(229, 163, 42, 0.5);
      color: var(--accent);
    }
    .banner.error {
      border-color: rgba(244, 164, 164, 0.5);
      color: var(--danger);
    }
    .banner.ok {
      border-color: rgba(93, 211, 158, 0.45);
      color: var(--good);
    }
    .banner.info {
      border-color: rgba(143, 147, 167, 0.45);
      color: var(--muted);
    }
    .banner a {
      color: var(--accent);
      font-weight: 600;
    }
    .status a {
      color: var(--accent);
      font-weight: 600;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .seg {
      display: flex;
      gap: 8px;
    }
    .seg button {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
      font-family: inherit;
    }
    .seg button.active[data-type="weightroom"] {
      background: rgba(255, 229, 153, 0.18);
      border-color: var(--wr);
    }
    .seg button.active[data-type="conditioning"] {
      background: rgba(159, 197, 232, 0.18);
      border-color: var(--cond);
    }
    #search {
      flex: 1;
      min-width: 160px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    .pin-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .pin-row input {
      width: 100px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
    }
    .status {
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      font-size: 0.9375rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .status.error { border-color: rgba(244, 164, 164, 0.45); color: var(--danger); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
    }
    .player {
      padding: 14px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      text-align: left;
      cursor: pointer;
      font-size: 0.875rem;
      line-height: 1.35;
      font-family: inherit;
      color: var(--text);
      transition: background 0.12s, border-color 0.12s;
      min-height: 52px;
    }
    .player:hover:not(:disabled) {
      border-color: rgba(229, 163, 42, 0.45);
    }
    .player.checked {
      border-color: var(--good);
      background: rgba(93, 211, 158, 0.14);
      font-weight: 600;
    }
    .player.is-queued {
      border-color: rgba(229, 163, 42, 0.5);
    }
    .player.is-saving {
      border-color: rgba(159, 197, 232, 0.55);
    }
    .player .mark {
      display: block;
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--good);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="shell">
    <a class="back-link" href="/">← Back to Team Tools</a>
    <h1>Coach check-in</h1>
    <p class="subtitle ghfb-subtitle">Tap a name to mark <strong>X</strong> for today’s session. Changes save to the attendance sheet.</p>

    <div id="todayBanner" class="banner info" hidden></div>

    <div id="setupBanner" class="banner warn" hidden>
      Saving is not connected. Redeploy ghfb and ensure Apps Script has your
      <code>SHEET_ID</code> set, then <strong>Deploy → New version</strong> on the web app.
    </div>

    <div class="toolbar">
      <div class="seg" role="group" aria-label="Session type">
        <button type="button" data-type="weightroom" class="active">Weightroom</button>
        <button type="button" data-type="conditioning">Conditioning</button>
      </div>
      <input type="search" id="search" placeholder="Search names…" autocomplete="off" />
      <div class="pin-row" id="pinRow">
        <label for="pin">PIN</label>
        <input type="password" id="pin" inputmode="numeric" autocomplete="current-password" />
      </div>
    </div>

    <div id="status" class="status">Loading roster…</div>
    <div id="grid" class="grid" aria-live="polite"></div>
  </div>

  <script src="/check-in-config.js"></script>
  <script type="module" src="/js/check-in.js"></script>
</body>
</html>
