server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/manifest+json;

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # Proxied + cached Google Sheets CSV (90s) — same origin for the dashboard
    # Coach check-in API — replace REPLACE_WITH_YOUR_SCRIPT_EXEC_URL after Apps Script deploy
    # Example: https://script.google.com/macros/s/AKfycb.../exec
    location /api/checkin {
        return 503 '{"ok":false,"error":"Check-in API not configured. Set proxy_pass in deploy/nginx.conf — see scripts/coach-check-in/README.md"}';
        add_header Content-Type application/json;
        # proxy_pass REPLACE_WITH_YOUR_SCRIPT_EXEC_URL;
        # proxy_ssl_server_name on;
        # proxy_set_header Host script.google.com;
        # proxy_redirect off;
        # add_header Cache-Control "no-store";
    }

    location = /api/attendance.csv {
        proxy_pass https://docs.google.com/spreadsheets/d/e/2PACX-1vT-oEpo0pvk7YAWpv2jAhyqmWeIYVEZRRXliKY6uY-_NGZwE3rl28BG2HSSLtamqfeTLvR5AT8ywh28/pub?gid=585894674&single=true&output=csv;
        proxy_ssl_server_name on;
        proxy_set_header Host docs.google.com;
        proxy_hide_header Set-Cookie;
        proxy_cache ghfb_attendance;
        proxy_cache_valid 200 90s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-GHFB-Cache $upstream_cache_status always;
        add_header Cache-Control "public, max-age=60";
        default_type text/csv;
        charset utf-8;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
