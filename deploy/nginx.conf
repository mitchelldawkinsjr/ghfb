server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve sibling containers at request time (not startup)
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/manifest+json;

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # Proxied + cached Google Sheets CSV (90s) — same origin for the dashboard
    # Coach check-in — Python sidecar follows Google redirects (no browser JSONP)
    location /api/checkin {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    location = /api/attendance.csv {
        proxy_pass https://docs.google.com/spreadsheets/d/e/2PACX-1vT-oEpo0pvk7YAWpv2jAhyqmWeIYVEZRRXliKY6uY-_NGZwE3rl28BG2HSSLtamqfeTLvR5AT8ywh28/pub?gid=585894674&single=true&output=csv;
        proxy_ssl_server_name on;
        proxy_set_header Host docs.google.com;
        proxy_hide_header Set-Cookie;
        proxy_cache ghfb_attendance;
        proxy_cache_valid 200 90s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-GHFB-Cache $upstream_cache_status always;
        add_header Cache-Control "public, max-age=60";
        default_type text/csv;
        charset utf-8;
    }

    # Daily Lift Plan tab (gid=1599839883)
    location = /api/lift-plan.csv {
        proxy_pass https://docs.google.com/spreadsheets/d/e/2PACX-1vT-oEpo0pvk7YAWpv2jAhyqmWeIYVEZRRXliKY6uY-_NGZwE3rl28BG2HSSLtamqfeTLvR5AT8ywh28/pub?gid=1599839883&single=true&output=csv;
        proxy_ssl_server_name on;
        proxy_set_header Host docs.google.com;
        proxy_hide_header Set-Cookie;
        proxy_cache ghfb_attendance;
        proxy_cache_valid 200 90s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-GHFB-Cache $upstream_cache_status always;
        add_header Cache-Control "public, max-age=60";
        default_type text/csv;
        charset utf-8;
    }

    # In-app proxy — GH Lift + Film Review (same origin for PWA)
    location /lift/ {
        set $lift_upstream gh-lift;
        rewrite ^/lift/?(.*)$ /$1 break;
        proxy_pass http://$lift_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /film/ {
        set $film_upstream flim-review-app;
        rewrite ^/film/?(.*)$ /$1 break;
        proxy_pass http://$film_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
