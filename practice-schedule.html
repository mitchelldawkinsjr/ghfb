<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Schedule & Timer — Godwin Heights Football</title>
  <meta name="description" content="Live practice timeline and countdown timer from the team sheet — 5-minute blocks collapsed into periods." />
  <meta name="theme-color" content="#0a0c10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 55%, #0f1520 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .back {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .back:hover { text-decoration: underline; }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top-actions a {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
    }
    .top-actions a:hover { color: var(--accent); }
    .top-refresh {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: 0;
      cursor: pointer;
      padding: 0;
    }
    .top-refresh:hover { color: var(--accent); }
    .practice-feed-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin: -8px 0 16px;
    }
    #practiceMeta h1 {
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .practice-date {
      color: var(--muted);
      font-size: 0.9375rem;
      margin-bottom: 16px;
    }
    .coach-bar {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 14px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      background: var(--card);
    }
    .coach-bar.is-active {
      border-color: rgba(229, 163, 42, 0.45);
      background: var(--accent-dim);
    }
    .coach-bar label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .coach-bar input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg1);
      color: var(--text);
      font: inherit;
      font-size: 0.9375rem;
      padding: 10px 12px;
    }
    .coach-bar input:focus {
      outline: 2px solid rgba(229, 163, 42, 0.45);
      outline-offset: 1px;
    }
    #editStatus {
      grid-column: 1 / -1;
      font-size: 0.8125rem;
      color: var(--muted);
    }
    #editStatus.is-error { color: var(--danger); }
    .practice-status {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.875rem;
      line-height: 1.45;
      margin-bottom: 20px;
      background: var(--card);
    }
    .practice-status--live {
      border-color: rgba(93, 211, 158, 0.45);
      background: rgba(93, 211, 158, 0.08);
      color: #d4f5e6;
    }
    .practice-status--warn {
      border-color: rgba(244, 164, 164, 0.45);
      background: rgba(244, 164, 164, 0.08);
    }
    .practice-status--info { color: var(--text); }
    .practice-timer.is-empty { display: none; }
    .practice-timer {
      margin-bottom: 20px;
    }
    .practice-timer.is-fullscreen {
      position: fixed;
      inset: 0;
      z-index: 40;
      margin: 0;
      padding: max(20px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
      background: linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 55%, #0f1520 100%);
      overflow: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }
    .practice-timer.is-fullscreen .timer-display {
      font-size: clamp(5rem, 22vw, 9rem);
    }
    .practice-timer.is-fullscreen .timer-label {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
    }
    .timer-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px 18px;
      position: relative;
      overflow: hidden;
    }
    .timer-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent);
      transform-origin: left;
      transform: scaleX(var(--timer-progress, 1));
      transition: transform 1s linear;
    }
    .timer-card.is-live {
      border-color: rgba(93, 211, 158, 0.45);
    }
    .timer-label {
      font-size: clamp(1.25rem, 4vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 4px;
    }
    .timer-detail {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 16px;
      min-height: 1.2em;
    }
    .timer-display {
      font-size: clamp(3.5rem, 14vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .timer-display--warn { color: #f0c060; }
    .timer-display--urgent {
      color: var(--danger);
      animation: timer-pulse 0.5s infinite alternate;
    }
    @keyframes timer-pulse {
      from { opacity: 1; }
      to { opacity: 0.55; }
    }
    .timer-index {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }
    .timer-controls {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .timer-btn {
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg1);
      color: var(--text);
    }
    .timer-btn:hover { border-color: var(--accent); color: var(--accent); }
    .timer-btn--primary {
      flex: 2;
      min-width: 120px;
      border: 0;
      background: var(--accent);
      color: #1a1204;
    }
    .timer-btn--primary:hover {
      filter: brightness(1.08);
      color: #1a1204;
    }
    .timer-btn--primary:disabled {
      opacity: 0.55;
      cursor: default;
      filter: none;
    }
    .timer-btn.is-active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .timer-next {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.8125rem;
    }
    .timer-next-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }
    .timer-next-name {
      color: var(--text);
      text-align: right;
      line-height: 1.35;
    }
    .timeline-track {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .timeline-now {
      position: absolute;
      left: 0;
      right: 0;
      height: 0;
      border-top: 2px solid var(--good);
      z-index: 2;
      pointer-events: none;
    }
    .timeline-now span {
      position: absolute;
      right: 0;
      top: -10px;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--good);
      background: var(--bg1);
      padding: 0 6px;
    }
    .timeline-block {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 12px;
      min-height: var(--block-height, 60px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.15s ease;
    }
    .timeline-block.is-current,
    .timeline-block.is-timer-active {
      border-color: rgba(93, 211, 158, 0.55);
      box-shadow: 0 0 0 1px rgba(93, 211, 158, 0.15);
    }
    .timeline-block.is-editable {
      cursor: pointer;
    }
    .timeline-block.is-editable:hover {
      border-color: rgba(229, 163, 42, 0.45);
    }
    .timeline-block-time {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.35;
      padding-top: 2px;
    }
    .timeline-block-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .timeline-block-body h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .timeline-edit-btn {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--bg1);
      color: var(--accent);
      font: inherit;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
    }
    .timeline-block-duration {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .timeline-block-detail {
      font-size: 0.8125rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .timeline-block-detail p + p { margin-top: 6px; }
    .practice-empty {
      color: var(--muted);
      font-size: 0.9375rem;
      padding: 20px 0;
    }
    .edit-modal[hidden] { display: none; }
    .edit-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 20px;
    }
    .edit-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 7, 10, 0.72);
      backdrop-filter: blur(4px);
    }
    .edit-modal-panel {
      position: relative;
      z-index: 1;
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
    .edit-modal-panel h2 {
      font-size: 1.0625rem;
      margin-bottom: 14px;
    }
    .edit-field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    .edit-field label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .edit-field input,
    .edit-field textarea,
    .edit-field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg1);
      color: var(--text);
      font: inherit;
      font-size: 0.9375rem;
      padding: 10px 12px;
    }
    .edit-field textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }
    .edit-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .edit-actions button {
      font: inherit;
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
    }
    .edit-actions button[type="submit"] {
      border: 0;
      background: var(--accent);
      color: #1a1204;
    }
    .edit-actions button[type="button"] {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }
    @media (max-width: 520px) {
      .timeline-block { grid-template-columns: 1fr; gap: 6px; }
      .edit-modal { padding: 0; align-items: stretch; }
      .edit-modal-panel {
        border-radius: 16px 16px 0 0;
        max-height: 90vh;
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <a class="back" href="/">← Team Tools</a>
      <div class="top-actions">
        <button type="button" id="refreshSchedule" class="top-refresh" title="Reload from published sheet CSV">Refresh CSV</button>
        <a id="sheetLink" href="#" target="_blank" rel="noopener noreferrer">Edit in sheet</a>
      </div>
    </div>

    <header id="practiceMeta">
      <h1>Practice schedule</h1>
      <p class="practice-date">Loading…</p>
      <p id="practiceFeedMeta" class="practice-feed-meta" aria-live="polite"></p>
    </header>

    <section id="coachBar" class="coach-bar" aria-label="Coach edit mode">
      <label for="coachPin">Coach PIN</label>
      <input id="coachPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="Enter PIN to edit" />
      <p id="editStatus">Enter coach PIN to edit periods in the sheet.</p>
    </section>

    <div id="practiceStatus" class="practice-status practice-status--info">Loading practice timeline…</div>

    <section id="practiceTimer" class="practice-timer" aria-label="Practice countdown timer">
      <div class="timer-card" id="timerCard">
        <div class="timer-label" id="timerSegLabel">—</div>
        <div class="timer-detail" id="timerSegDetail"></div>
        <div class="timer-display" id="timerDisplay">0:00</div>
        <div class="timer-index" id="timerSegIndex"></div>
        <div class="timer-controls">
          <button type="button" class="timer-btn timer-btn--primary" id="timerStart">Run timer</button>
          <button type="button" class="timer-btn" id="timerSkip">Skip →</button>
          <button type="button" class="timer-btn" id="timerReset" title="Sync countdown to sheet schedule">↺ Sync</button>
          <button type="button" class="timer-btn" id="timerAnnounce" aria-pressed="false" title="Announce period names aloud">🔕 Announce</button>
          <button type="button" class="timer-btn" id="timerExpand" aria-pressed="false" title="Expand timer for the field">⛶ Expand</button>
        </div>
      </div>
      <div class="timer-next">
        <span class="timer-next-label">Up next</span>
        <span class="timer-next-name" id="timerNextName">—</span>
      </div>
    </section>

    <div id="practiceTimeline"></div>
  </div>

  <div id="editModal" class="edit-modal" hidden>
    <div id="editBackdrop" class="edit-modal-backdrop"></div>
    <form id="editForm" class="edit-modal-panel">
      <h2>Edit practice period</h2>
      <div class="edit-field">
        <label for="editTitle">Title</label>
        <input id="editTitle" type="text" required />
      </div>
      <div class="edit-field">
        <label for="editNotes">Notes</label>
        <textarea id="editNotes" placeholder="Optional drill details (saved below the title in the sheet)"></textarea>
      </div>
      <div class="edit-field">
        <label for="editEndRow">End time</label>
        <select id="editEndRow"></select>
      </div>
      <div class="edit-actions">
        <button id="editCancel" type="button">Cancel</button>
        <button type="submit">Save to sheet</button>
      </div>
    </form>
  </div>

  <script src="/check-in-config.js"></script>
  <script type="module" src="/js/practice-schedule.js"></script>
</body>
</html>
